name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # JOB 1: Code Verification (Continuous Integration)
  verify-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Check if Frontend actually builds cleanly
      - name: Test Frontend Build
        run: |
          cd frontend
          npm install
          npm run build

      # Check if Backend dependencies install correctly
      - name: Test Backend Setup
        run: |
          cd cattle-backend
          npm install

  # JOB 2: Build & Ship to Docker Hub (Continuous Deployment)
  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: verify-and-test # Yeh tabhi chalega jab upar wale tests pass honge!
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Uses official highly optimized docker actions instead of raw terminal commands
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Frontend
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cattle-frontend:latest

      # 2. Backend
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./cattle-backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cattle-backend:latest

      # 3. ML Service
      - name: Build & Push ML Service
        uses: docker/build-push-action@v5
        with:
          context: ./ml-model
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cattle-ml:latest